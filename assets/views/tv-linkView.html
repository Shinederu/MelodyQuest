<section class="mq-page mq-tv-link-page">
  <section class="mq-card mq-card--soft mq-tv-link-card">
    <div class="mq-card-heading">
      <div class="mq-kicker">Mode TV</div>
      <h2>Lier un écran au salon</h2>
      <p class="mq-card-copy">Scanne le QR code affiché sur la TV, ou entre le code à 6 caractères. La TV affichera la partie, les joueurs continuent de répondre sur téléphone ou ordinateur.</p>
    </div>

    <div class="mq-tv-link-summary">
      <span>Salon actif</span>
      <strong id="tv-link-lobby">Chargement...</strong>
    </div>

    <div class="mq-form-stack">
      <div class="mq-field">
        <label for="tv-link-code">Code TV</label>
        <input id="tv-link-code" type="text" inputmode="latin" autocomplete="off" maxlength="6" placeholder="ABC123" />
      </div>

      <p id="tv-link-status" class="status"></p>

      <div class="mq-actions">
        <button id="btn-tv-link-submit" type="button">Lier la TV</button>
        <button id="btn-tv-link-back" type="button" class="mq-secondary">Retour au salon</button>
        <button id="btn-tv-link-open-tv" type="button" class="mq-secondary">Ouvrir le mode TV</button>
      </div>
    </div>
  </section>
</section>
