<section class="mq-page">
  <header class="mq-page-header">
    <h1 id="lobby-title">Lobby</h1>
    <p>Preparation de partie, participants et configuration du salon.</p>
  </header>

  <section class="mq-card">
    <div class="mq-actions">
      <button id="btn-lobby-main" type="button" class="mq-secondary">Menu principal</button>
      <button id="btn-lobby-leave" type="button" class="mq-danger">Quitter</button>
    </div>
    <p id="lobby-status" class="status"></p>
    <p id="lobby-meta" class="mq-muted">Chargement du lobby...</p>
    <p id="lobby-rounds" class="mq-muted"></p>
    <p id="lobby-timer" class="mq-muted"></p>
  </section>

  <div class="mq-two-cols">
    <section class="mq-card">
      <h2>Participants</h2>
      <ul id="lobby-players" class="mq-clean-list"></ul>
    </section>

    <section class="mq-card">
      <h2>Categories selectionnees</h2>
      <div id="lobby-categories-selected" class="mq-chip-row"></div>
    </section>
  </div>

  <section class="mq-card owner-only" style="display:none;">
    <h2>Configuration du lobby</h2>
    <div class="mq-grid">
      <div>
        <label for="lobby-config-rounds">Nombre de manches</label>
        <input id="lobby-config-rounds" type="number" min="1" max="50" />
      </div>
      <div>
        <label for="lobby-config-timer">Temps avant reponse</label>
        <input id="lobby-config-timer" type="number" min="10" max="300" />
      </div>
    </div>

    <div>
      <p class="mq-section-label">Choix des categories</p>
      <div id="lobby-config-categories" class="mq-check-grid"></div>
    </div>

    <div class="mq-actions">
      <button id="btn-lobby-save-config" type="button">Enregistrer</button>
      <button id="btn-lobby-start" type="button">Commencer</button>
      <button id="btn-lobby-delete" type="button" class="mq-danger">Supprimer le lobby</button>
    </div>
  </section>
</section>
