<section class="mq-page">
  <div class="mq-two-cols">
    <section class="mq-card mq-card--accent">
      <div class="mq-card-heading">
        <div class="mq-kicker">Code invite</div>
        <h2>Entrer avec un code</h2>
        <p class="mq-card-copy">Pratique pour un salon prive partage sur Discord, vocal ou message.</p>
      </div>

      <div class="mq-form-stack">
        <div class="mq-field">
          <label for="lobbylist-code">Code du salon</label>
          <input id="lobbylist-code" type="text" maxlength="8" placeholder="ABC123" />
        </div>
        <button id="btn-lobbylist-join" type="button">Rejoindre</button>
      </div>

      <p id="lobbylist-status" class="status"></p>

      <div class="mq-actions mq-actions--full">
        <button id="btn-lobbylist-back" type="button" class="mq-secondary mq-button-block">Retour accueil</button>
      </div>
    </section>

    <section class="mq-card mq-card--soft">
      <div class="mq-card-heading">
        <div class="mq-kicker">Public</div>
        <h2>Salons ouverts</h2>
        <p class="mq-card-copy">La liste se met a jour pendant que tu regardes.</p>
      </div>

      <div class="mq-row">
        <span id="lobbylist-count" class="mq-chip">0 salon actif</span>
        <button id="btn-lobbylist-refresh" type="button" class="mq-secondary">Rafraichir</button>
      </div>

      <ul id="lobbylist-items" class="mq-clean-list"></ul>
    </section>
  </div>
</section>
