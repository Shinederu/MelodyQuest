<section class="mq-page">
  <section class="mq-card mq-card--soft">
    <div class="mq-admin-toolbar">
      <div class="mq-actions">
        <button id="btn-cat-back" type="button" class="mq-secondary">Retour management</button>
        <button id="btn-cat-refresh" type="button">Rafraîchir</button>
      </div>
      <div class="mq-admin-toolbar__meta">
        <div class="mq-admin-toolbar__cluster">
          <span id="cat-count" class="mq-chip">0 categories</span>
        </div>
        <p id="cat-status" class="status">Selectionne une categorie ou cree-en une nouvelle.</p>
      </div>
    </div>
  </section>

  <div class="mq-admin-workspace">
    <section class="mq-card mq-admin-pane">
      <div class="mq-admin-pane__header">
        <div class="mq-card-heading">
          <div class="mq-kicker">Exploration</div>
          <h2>Categories disponibles</h2>
          <p class="mq-card-copy">Selection rapide a gauche, edition detaillee a droite.</p>
        </div>
        <span id="cat-count-inline" class="mq-chip">0 categories</span>
      </div>
      <div class="mq-admin-list-shell">
        <div id="cat-list" class="mq-admin-list"></div>
      </div>
    </section>

    <section class="mq-card mq-card--accent mq-admin-pane mq-admin-pane--sticky">
      <div class="mq-card-heading">
        <div class="mq-kicker">Edition</div>
        <h2 id="cat-form-title">Nouvelle categorie</h2>
        <p id="cat-form-helper" class="mq-admin-helper">Donne un nom clair a la nouvelle categorie.</p>
      </div>
      <div class="mq-admin-form-grid">
        <div class="mq-field">
          <label for="cat-name">Nom</label>
          <input id="cat-name" type="text" placeholder="Ex: Dessins animes" />
        </div>
        <p class="mq-muted">Ce nom sera visible dans les reglages de salon.</p>
      </div>
      <div class="mq-admin-form-actions">
        <button id="btn-cat-create" type="button">Ajouter</button>
        <button id="btn-cat-update" type="button">Mettre a jour</button>
        <button id="btn-cat-reset" type="button" class="mq-secondary">Vider</button>
        <button id="btn-cat-delete" type="button" class="mq-danger">Supprimer</button>
      </div>
    </section>
  </div>
</section>
