<section class="mq-page">
  <div class="mq-player-dashboard">
    <section class="mq-card mq-card--accent mq-play-card">
      <div class="mq-card-heading">
        <div class="mq-kicker">Départ rapide</div>
        <h2>Créer ou rejoindre</h2>
        <p class="mq-card-copy">Si tu organises la partie, crée un salon. Si quelqu'un t'a donné un code, colle-le ici.</p>
      </div>

      <div class="mq-main-action-stack">
        <div class="mq-main-action-block">
          <p class="mq-section-label">Je lance la partie</p>
          <div class="mq-field">
            <label for="main-lobby-name">Nom du salon</label>
            <input id="main-lobby-name" type="text" maxlength="120" placeholder="Blindtest du vendredi" />
          </div>
          <label class="mq-check mq-check--compact">
            <input id="main-lobby-public" type="checkbox" checked />
            <span>Visible dans la liste des salons publics</span>
          </label>
          <button id="btn-main-create" type="button">Créer le salon</button>
        </div>

        <div class="mq-main-action-block">
          <p class="mq-section-label">J'ai un code</p>
          <div class="mq-field">
            <label for="main-lobby-code">Code du salon</label>
            <input id="main-lobby-code" type="text" maxlength="16" placeholder="ABC123" />
          </div>
          <button id="btn-main-join-code" type="button">Entrer dans le salon</button>
        </div>
      </div>

      <p id="main-status" class="status"></p>

      <div id="main-admin-actions" class="mq-actions mq-actions--full">
        <button id="btn-main-management" type="button" class="mq-secondary mq-button-block">Gestion du catalogue</button>
      </div>
    </section>

    <section class="mq-card mq-card--soft">
      <div class="mq-card-heading">
        <div class="mq-kicker">Public</div>
        <h2>Salons ouverts</h2>
        <p class="mq-card-copy">La liste se met à jour pendant que tu regardes.</p>
      </div>

      <div class="mq-row">
        <span id="main-lobby-count" class="mq-chip">0 salon actif</span>
        <button id="btn-main-refresh" type="button" class="mq-secondary">Rafraîchir</button>
      </div>

      <ul id="main-lobby-list" class="mq-clean-list"></ul>
    </section>
  </div>
</section>
