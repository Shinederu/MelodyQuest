<section class="mq-page">
  <header class="mq-page-header">
    <div class="mq-kicker">Fin de partie</div>
    <h1 id="result-title">Resultats</h1>
    <p>Classement final du lobby une fois toutes les manches terminees.</p>
  </header>

  <section class="mq-card mq-card--soft">
    <div class="mq-card-heading">
      <div class="mq-kicker">Classement</div>
      <h2>Scores</h2>
    </div>
    <ul id="result-scoreboard" class="mq-clean-list"></ul>
  </section>

  <section class="mq-card mq-card--accent">
    <p id="result-countdown" class="mq-section-label">Retour automatique au lobby dans 15s</p>
    <p id="result-status" class="status"></p>
  </section>
</section>
