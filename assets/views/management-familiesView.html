<section class="mq-page">
  <header class="mq-page-header">
    <div class="mq-kicker">Catalogue</div>
    <h1>Gestion des familles</h1>
    <p>Chaque famille appartient a une categorie et regroupe plusieurs musiques proches.</p>
  </header>

  <section class="mq-card mq-card--soft">
    <div class="mq-row">
      <button id="btn-fam-back" type="button" class="mq-secondary">Retour management</button>
      <button id="btn-fam-refresh" type="button">Rafraichir</button>
      <button id="btn-fam-add" type="button">Ajouter une famille</button>
    </div>
    <p id="fam-status" class="status"></p>
  </section>

  <div class="mq-two-cols">
    <section class="mq-card">
      <div class="mq-card-heading">
        <div class="mq-kicker">Exploration</div>
        <h2>Liste des familles</h2>
      </div>
      <div id="fam-list" class="mq-admin-list"></div>
    </section>

    <section id="fam-form" class="mq-card mq-card--accent" hidden>
      <div class="mq-card-heading">
        <div class="mq-kicker">Edition</div>
        <h2 id="fam-form-title">Nouvelle famille</h2>
      </div>
      <div class="mq-field">
        <label for="fam-category">Categorie</label>
        <select id="fam-category"></select>
      </div>

      <div class="mq-field">
        <label for="fam-name">Nom</label>
        <input id="fam-name" type="text" placeholder="Ex: Pokemon" />
      </div>

      <div class="mq-field">
        <label for="fam-description">Description</label>
        <input id="fam-description" type="text" placeholder="Description courte optionnelle" />
      </div>

      <p class="mq-muted">Le slug technique est genere automatiquement a partir du nom.</p>
      <div class="mq-actions">
        <button id="btn-fam-create" type="button">Ajouter</button>
        <button id="btn-fam-update" type="button">Mettre a jour</button>
        <button id="btn-fam-reset" type="button" class="mq-secondary">Vider</button>
        <button id="btn-fam-delete" type="button" class="mq-danger">Supprimer</button>
      </div>
    </section>
  </div>
</section>
