<section class="mq-page">
  <section class="mq-card mq-card--soft mq-admin-dashboard">
    <div class="mq-admin-toolbar">
      <div class="mq-row">
        <button id="btn-mgmt-main" type="button" class="mq-secondary">Retour menu principal</button>
      </div>
    </div>

    <div class="mq-admin-step-grid">
      <button id="btn-mgmt-categories" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Étape 1</span>
          <strong>Catégories</strong>
          <p>Définis les grandes thématiques proposées dans les lobbies avant de descendre au niveau détail.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">01</span>
          <span>Ouvrir le niveau parent</span>
        </div>
      </button>

      <button id="btn-mgmt-families" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Étape 2</span>
          <strong>Œuvres</strong>
          <p>Regroupe les morceaux qui doivent partager la même réponse attendue pendant la partie.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">02</span>
          <span>Structurer les réponses</span>
        </div>
      </button>

      <button id="btn-mgmt-tracks" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Étape 3</span>
          <strong>Musiques</strong>
          <p>Ajoute les pistes jouables, rattache-les à une œuvre et laisse l'interface créer le regroupement si besoin.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">03</span>
          <span>Finaliser le contenu</span>
        </div>
      </button>

      <button id="btn-mgmt-validation" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Étape 4</span>
          <strong>Validation</strong>
          <p>Contrôle les nouvelles vidéos YouTube avant de les rendre jouables dans les lobbies et les manches.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">04</span>
          <span>Vérifier les ajouts</span>
        </div>
      </button>

      <button id="btn-mgmt-suggestions" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Joueurs</span>
          <strong>Suggestions</strong>
          <p>Consulte les alias, corrections et nouvelles musiques proposés pendant les parties ou depuis la page publique.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">05</span>
          <span>Traiter les retours</span>
        </div>
      </button>
    </div>
  </section>
</section>
