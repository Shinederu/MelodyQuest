<section class="mq-page">
  <header class="mq-page-header mq-page-header--hero">
    <div class="mq-kicker">Administration</div>
    <div class="mq-hero-grid">
      <div>
        <h1>Management</h1>
        <p>Gestion des categories, des oeuvres et des musiques depuis un hub unique plus lisible et plus coherent avec le reste de l'application.</p>
      </div>

      <aside class="mq-hero-panel">
        <div class="mq-stat-grid">
          <article class="mq-stat">
            <span>Catalogue</span>
            <strong>Organise l'univers du blindtest</strong>
          </article>
          <article class="mq-stat">
            <span>Edition</span>
            <strong>Modifie rapidement les contenus actifs</strong>
          </article>
        </div>
      </aside>
    </div>
  </header>

  <section class="mq-card mq-card--soft mq-admin-dashboard">
    <div class="mq-admin-toolbar">
      <div class="mq-row">
        <button id="btn-mgmt-main" type="button" class="mq-secondary">Retour menu principal</button>
      </div>
      <div class="mq-admin-toolbar__cluster">
        <span class="mq-chip">4 niveaux</span>
        <span class="mq-chip">Workflow catalogue</span>
      </div>
    </div>

    <div class="mq-admin-step-grid">
      <button id="btn-mgmt-categories" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Etape 1</span>
          <strong>Categories</strong>
          <p>Definis les grandes thematiques proposees dans les lobbies avant de descendre au niveau detail.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">01</span>
          <span>Ouvrir le niveau parent</span>
        </div>
      </button>

      <button id="btn-mgmt-families" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Etape 2</span>
          <strong>Oeuvres</strong>
          <p>Regroupe les morceaux qui doivent partager la meme reponse attendue pendant la partie.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">02</span>
          <span>Structurer les reponses</span>
        </div>
      </button>

      <button id="btn-mgmt-tracks" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Etape 3</span>
          <strong>Musiques</strong>
          <p>Ajoute les pistes jouables, rattache-les a une oeuvre et laisse l'interface creer le regroupement si besoin.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">03</span>
          <span>Finaliser le contenu</span>
        </div>
      </button>

      <button id="btn-mgmt-validation" type="button" class="mq-admin-nav-card">
        <div>
          <span class="mq-kicker">Etape 4</span>
          <strong>Validation</strong>
          <p>Controle les nouvelles URL YouTube avant de les rendre jouables dans les lobbies et les manches.</p>
        </div>
        <div class="mq-admin-nav-card__footer">
          <span class="mq-admin-nav-card__index">04</span>
          <span>Verifier les ajouts</span>
        </div>
      </button>
    </div>
  </section>
</section>
