<section class="mq-page">
  <header class="mq-page-header">
    <h1>MelodyQuest</h1>
    <p>Un jeu musical multijoueur pour reconnaitre les morceaux, affronter ses amis et gerer ses propres salons de partie.</p>
  </header>

  <div class="mq-two-cols">
    <section class="mq-card">
      <h2>Connexion</h2>
      <form id="login-form" autocomplete="on">
        <label for="login-username">Nom d'utilisateur</label>
        <input type="text" id="login-username" name="username" autocomplete="username" maxlength="254" size="30" />

        <label for="login-password">Mot de passe</label>
        <input type="password" id="login-password" name="password" autocomplete="current-password" maxlength="254" size="30" />

        <button id="btn-login" type="submit">Se connecter</button>
      </form>
    </section>

    <section class="mq-card">
      <h2>Inscription</h2>
      <form id="register-form" autocomplete="on">
        <label for="register-username">Nom d'utilisateur</label>
        <input type="text" id="register-username" name="username" autocomplete="username" required minlength="1" maxlength="254" size="30" />

        <label for="register-email">Adresse e-mail</label>
        <input type="email" id="register-email" name="email" autocomplete="email" required minlength="1" maxlength="254" size="30" />

        <label for="register-password">Mot de passe</label>
        <input type="password" id="register-password" name="new-password" autocomplete="new-password" maxlength="254" size="30" />

        <label for="register-confirm-password">Confirmer le mot de passe</label>
        <input type="password" id="register-confirm-password" name="confirm-password" autocomplete="new-password" maxlength="254" size="30" />

        <button id="btn-register" type="submit">S'inscrire</button>
      </form>
    </section>
  </div>
</section>
